name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python universal_craps_engine.py --run-tests

      - name: Run deterministic YAML scenarios
        run: >-
          python universal_craps_engine.py
          uce_strategy_full_showcase.yaml
          --run-scenarios

      - name: Run strategy smoke test
        run: >-
          python universal_craps_engine.py
          uce_strategy_100_across_with_hardways.yaml
          --simulate
